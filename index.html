<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stream Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; font-family: system-ui, sans-serif; color: #fff; overflow: hidden; }

#loader { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 100; }
.spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,.1); border-top-color: #f5c518; border-radius: 50%; animation: spin .9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#loader-text { margin-top: 15px; font-size: 14px; color: #94a3b8; }

#player { position: fixed; inset: 0; display: none; background: #000; }
video { width: 100%; height: 100%; display: block; }

video::cue {
  background: rgba(0,0,0,0.8);
  color: #fff;
  font-size: 1em;
  font-family: system-ui, sans-serif;
  text-shadow: 1px 1px 3px #000;
}

#err {
  position: fixed; inset: 0; display: none;
  flex-direction: column; align-items: center; justify-content: center;
  background: #000; text-align: center; padding: 20px; gap: 12px;
}
#err-icon { font-size: 40px; }
#err-title { font-size: 17px; font-weight: bold; color: #fff; }
#err-detail { color: #ef4444; font-size: 13px; max-width: 85%; line-height: 1.5; }
#err-retry {
  margin-top: 8px;
  background: #f5c518; color: #000;
  border: none; border-radius: 8px;
  padding: 10px 28px; font-size: 14px;
  font-weight: 700; cursor: pointer;
}
#err-retry:active { opacity: 0.8; }

#cc-btn {
  position: fixed; bottom: 72px; right: 12px; z-index: 60;
  display: none; align-items: center; justify-content: center;
  width: 44px; height: 28px;
  background: rgba(0,0,0,0.75);
  border: 2px solid rgba(255,255,255,0.5);
  border-radius: 5px; cursor: pointer;
  font-size: 11px; font-weight: 700; letter-spacing: 0.5px; color: #fff;
  user-select: none; transition: border-color .2s, background .2s;
}
#cc-btn.active { border-color: #f5c518; color: #f5c518; }
#cc-btn:active { transform: scale(0.95); }

#cc-panel {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 70;
  background: #1a1a1a; border-radius: 16px 16px 0 0;
  padding: 0 0 24px;
  transform: translateY(100%);
  transition: transform .28s cubic-bezier(.4,0,.2,1);
  max-height: 70vh; overflow-y: auto;
}
#cc-panel.open { transform: translateY(0); }
#cc-panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
#cc-panel-header span { font-size: 15px; font-weight: 600; color: #fff; }
#cc-close { background: none; border: none; color: #aaa; font-size: 22px; cursor: pointer; line-height: 1; padding: 0 4px; }
#cc-options { padding: 8px 0; }
.cc-option {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; cursor: pointer; transition: background .15s;
  font-size: 14px; color: #ddd; border: none; background: none; width: 100%; text-align: left;
}
.cc-option:active { background: rgba(255,255,255,0.06); }
.cc-option .cc-lang { flex: 1; }
.cc-option .cc-check {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.25); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.cc-option.active .cc-lang { color: #f5c518; font-weight: 600; }
.cc-option.active .cc-check { background: #f5c518; border-color: #f5c518; }
.cc-option.active .cc-check::after { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #000; }
#cc-overlay { position: fixed; inset: 0; z-index: 65; background: rgba(0,0,0,0.5); display: none; }
#cc-overlay.open { display: block; }
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <div id="loader-text">Menyiapkan Player...</div>
</div>

<div id="player">
  <video id="v" controls autoplay playsinline crossorigin="anonymous"></video>
</div>

<button id="cc-btn" title="Pengaturan Subtitle">CC</button>
<div id="cc-overlay"></div>
<div id="cc-panel">
  <div id="cc-panel-header">
    <span>🎬 Subtitle / CC</span>
    <button id="cc-close">✕</button>
  </div>
  <div id="cc-options"></div>
</div>

<div id="err">
  <div id="err-icon">⚠️</div>
  <div id="err-title">Gagal Memuat Konten</div>
  <div id="err-detail"></div>
  <button id="err-retry">🔄 Coba Lagi</button>
</div>

<script>
const LANG_MAP = {
  'id':'🇮🇩 Indonesia','in':'🇮🇩 Indonesia','ind':'🇮🇩 Indonesia','indonesian':'🇮🇩 Indonesia',
  'en':'🇺🇸 English','eng':'🇺🇸 English','english':'🇺🇸 English',
  'ms':'🇲🇾 Melayu','may':'🇲🇾 Melayu','malay':'🇲🇾 Melayu',
  'ko':'🇰🇷 Korean','kor':'🇰🇷 Korean','korean':'🇰🇷 Korean',
  'ja':'🇯🇵 Japanese','jpn':'🇯🇵 Japanese','japanese':'🇯🇵 Japanese',
  'zh':'🇨🇳 Chinese','chi':'🇨🇳 Chinese','chinese':'🇨🇳 Chinese',
  'th':'🇹🇭 Thai','tha':'🇹🇭 Thai','thai':'🇹🇭 Thai',
  'vi':'🇻🇳 Vietnamese','vie':'🇻🇳 Vietnamese','vietnamese':'🇻🇳 Vietnamese',
  'ar':'🇸🇦 Arabic','ara':'🇸🇦 Arabic','arabic':'🇸🇦 Arabic',
  'es':'🇪🇸 Spanish','spa':'🇪🇸 Spanish','spanish':'🇪🇸 Spanish',
  'fr':'🇫🇷 French','fra':'🇫🇷 French','french':'🇫🇷 French',
  'de':'🇩🇪 German','ger':'🇩🇪 German','german':'🇩🇪 German',
  'pt':'🇧🇷 Portuguese','por':'🇧🇷 Portuguese','portuguese':'🇧🇷 Portuguese',
  'ru':'🇷🇺 Russian','rus':'🇷🇺 Russian','russian':'🇷🇺 Russian',
  'tr':'🇹🇷 Turkish','tur':'🇹🇷 Turkish','turkish':'🇹🇷 Turkish',
  'hi':'🇮🇳 Hindi','hin':'🇮🇳 Hindi','hindi':'🇮🇳 Hindi',
  'tl':'🇵🇭 Tagalog','tgl':'🇵🇭 Tagalog','tagalog':'🇵🇭 Tagalog','filipino':'🇵🇭 Tagalog'
};
const NAME_TO_CODE = {
  'indonesia':'id','indonesian':'id','ind':'id','in':'id',
  'english':'en','eng':'en','melayu':'ms','malay':'ms','may':'ms',
  'korean':'ko','kor':'ko','japanese':'ja','jpn':'ja',
  'chinese':'zh','chi':'zh','thai':'th','tha':'th',
  'vietnamese':'vi','vie':'vi','arabic':'ar','ara':'ar',
  'spanish':'es','spa':'es','french':'fr','fra':'fr',
  'german':'de','ger':'de','portuguese':'pt','por':'pt',
  'russian':'ru','rus':'ru','turkish':'tr','tur':'tr',
  'hindi':'hi','hin':'hi','tagalog':'tl','filipino':'tl'
};

const p = new URLSearchParams(location.search);
const id = p.get('id'), s = p.get('s'), e = p.get('e');
const subLang = (p.get('ds_lang') || 'id').toLowerCase();

function showLoader(msg) {
  document.getElementById('loader').style.display = 'flex';
  document.getElementById('loader-text').textContent = msg || 'Menyiapkan Player...';
  document.getElementById('err').style.display = 'none';
  document.getElementById('player').style.display = 'none';
}
function showError(msg) {
  document.getElementById('loader').style.display = 'none';
  document.getElementById('err').style.display = 'flex';
  document.getElementById('err-detail').textContent = msg;
}

// ── Fetch dengan retry otomatis ───────────────────────────────────────────────
async function fetchWithRetry(url, maxRetry = 2) {
  let lastErr;
  for (let attempt = 1; attempt <= maxRetry; attempt++) {
    try {
      if (attempt > 1) {
        document.getElementById('loader-text').textContent = `Mencoba lagi... (${attempt}/${maxRetry})`;
        await new Promise(r => setTimeout(r, 1500));
      }
      const res = await fetch(url);
      const text = await res.text();
      if (!text || text.trim() === '') throw new Error('Server tidak merespons');
      let data;
      try { data = JSON.parse(text); } catch { throw new Error('Respons server tidak valid, coba lagi'); }
      return data;
    } catch (err) {
      lastErr = err;
    }
  }
  throw lastErr;
}

function guessLangFromUrl(url) {
  if (!url) return null;
  const clean = url.toLowerCase().split('?')[0];
  for (const word of Object.keys(NAME_TO_CODE)) {
    const re = new RegExp('(?:^|[^a-z])' + word + '(?:[^a-z]|$)', 'i');
    if (re.test(clean)) return NAME_TO_CODE[word];
  }
  const m = clean.match(/[._\-/]([a-z]{2,3})(?=\.(?:vtt|srt)(?:$|[?&]))/);
  if (m && (LANG_MAP[m[1]] || NAME_TO_CODE[m[1]])) return NAME_TO_CODE[m[1]] || m[1];
  return null;
}

function normalizeSub(sub) {
  const url = sub.url || sub.file || sub.src || sub.link;
  let lang = (sub.lang || sub.language || sub.srclang || sub.languageCode || sub.iso || '').toString().toLowerCase().trim();
  let label = (sub.label || sub.name || sub.title || sub.display || '').toString().trim();
  if (lang && NAME_TO_CODE[lang]) lang = NAME_TO_CODE[lang];
  if (!lang && label) {
    const k = label.toLowerCase();
    if (NAME_TO_CODE[k]) lang = NAME_TO_CODE[k];
    else if (LANG_MAP[k]) lang = k;
    else for (const word of Object.keys(NAME_TO_CODE)) { if (k.includes(word)) { lang = NAME_TO_CODE[word]; break; } }
  }
  if (!lang) lang = guessLangFromUrl(url) || '';
  if (!label) label = LANG_MAP[lang] || (lang ? lang.toUpperCase() : 'Unknown');
  else if (LANG_MAP[lang]) label = LANG_MAP[lang];
  return { url, lang: lang || 'und', label };
}

function srtToVtt(srt) {
  srt = srt.replace(/^\uFEFF/, '').replace(/\r+/g, '');
  srt = srt.replace(/(\d\d:\d\d:\d\d),(\d{3})/g, '$1.$2');
  return 'WEBVTT\n\n' + srt.trim() + '\n';
}

async function loadSubtitleAsVtt(url) {
  const proxied = '/api?url=' + encodeURIComponent(url);
  const res = await fetch(proxied);
  let text = await res.text();
  if (!/^\uFEFF?WEBVTT/.test(text)) text = srtToVtt(text);
  return URL.createObjectURL(new Blob([text], { type: 'text/vtt' }));
}

// ── CC Panel ──────────────────────────────────────────────────────────────────
const ccBtn     = document.getElementById('cc-btn');
const ccPanel   = document.getElementById('cc-panel');
const ccOverlay = document.getElementById('cc-overlay');
const ccClose   = document.getElementById('cc-close');
const ccOptions = document.getElementById('cc-options');

function openPanel()  { ccPanel.classList.add('open');    ccOverlay.classList.add('open'); }
function closePanel() { ccPanel.classList.remove('open'); ccOverlay.classList.remove('open'); }

ccBtn.addEventListener('click', openPanel);
ccClose.addEventListener('click', closePanel);
ccOverlay.addEventListener('click', closePanel);

function setActiveTrack(index) {
  const v = document.getElementById('v');
  for (let i = 0; i < v.textTracks.length; i++)
    v.textTracks[i].mode = (i === index) ? 'showing' : 'disabled';
  ccOptions.querySelectorAll('.cc-option').forEach((btn, i) =>
    btn.classList.toggle('active', i === index + 1));
  if (index === -1) { ccBtn.classList.remove('active'); ccBtn.style.opacity = '0.5'; }
  else              { ccBtn.classList.add('active');    ccBtn.style.opacity = '1'; }
  closePanel();
}

function buildCCPanel(v, subs) {
  ccOptions.innerHTML = '';
  const offBtn = document.createElement('button');
  offBtn.className = 'cc-option';
  offBtn.innerHTML = `<span class="cc-lang">Nonaktifkan</span><span class="cc-check"></span>`;
  offBtn.onclick = () => setActiveTrack(-1);
  ccOptions.appendChild(offBtn);
  if (!subs || subs.length === 0) {
    const noSub = document.createElement('div');
    noSub.style.cssText = 'padding:16px 20px;color:#666;font-size:13px;';
    noSub.textContent = 'Tidak ada subtitle tersedia untuk konten ini.';
    ccOptions.appendChild(noSub);
    return;
  }
  for (let i = 0; i < v.textTracks.length; i++) {
    const track = v.textTracks[i];
    const btn = document.createElement('button');
    btn.className = 'cc-option' + (track.mode === 'showing' ? ' active' : '');
    btn.innerHTML = `<span class="cc-lang">${track.label || track.language || 'Track '+(i+1)}</span><span class="cc-check"></span>`;
    btn.onclick = () => setActiveTrack(i);
    ccOptions.appendChild(btn);
  }
  const activeIdx = [...v.textTracks].findIndex(t => t.mode === 'showing');
  ccOptions.querySelectorAll('.cc-option').forEach((btn, i) =>
    btn.classList.toggle('active', i === activeIdx + 1));
}

async function attachSubtitles(v, subs) {
  ccBtn.style.display = 'flex';
  ccBtn.style.opacity = '0.5';
  if (!Array.isArray(subs) || subs.length === 0) { buildCCPanel(v, []); return; }
  const seen = new Set();
  for (const raw of subs) {
    if (!raw) continue;
    const sub = normalizeSub(raw);
    if (!sub.url) continue;
    const key = sub.lang + '|' + sub.url;
    if (seen.has(key)) continue;
    seen.add(key);
    try {
      const vttUrl = await loadSubtitleAsVtt(sub.url);
      const track = document.createElement('track');
      track.kind = 'subtitles'; track.label = sub.label;
      track.srclang = sub.lang; track.src = vttUrl;
      if (sub.lang === subLang) track.default = true;
      v.appendChild(track);
    } catch (err) { console.warn('Gagal memuat subtitle', sub, err); }
  }
  setTimeout(() => {
    let activated = false;
    for (let i = 0; i < v.textTracks.length; i++) {
      const t = v.textTracks[i];
      if (t.language === subLang && !activated) { t.mode = 'showing'; activated = true; }
      else t.mode = 'disabled';
    }
    if (!activated && v.textTracks.length > 0) v.textTracks[0].mode = 'showing';
    buildCCPanel(v, subs);
    if (v.textTracks.length > 0) { ccBtn.classList.add('active'); ccBtn.style.opacity = '1'; }
  }, 800);
}

// ── Load & Play ───────────────────────────────────────────────────────────────
function loadStream() {
  if (!id) return;
  showLoader('Menyiapkan Player...');
  const apiUrl = `/api?id=${id}${s ? '&s='+s+'&e='+(e||'1') : ''}&ds_lang=${subLang}`;
  fetchWithRetry(apiUrl, 3)
    .then(data => {
      if (data.error) throw new Error(data.error);
      if (!data.url) throw new Error('Link stream tidak ditemukan');
      play(data.url, data.subtitle);
    })
    .catch(err => showError(err.message));
}

document.getElementById('err-retry').addEventListener('click', loadStream);
loadStream();

function play(videoUrl, subtitleData) {
  const v = document.getElementById('v');
  const streamUrl = '/api?url=' + encodeURIComponent(videoUrl);
  if (Hls.isSupported()) {
    const hls = new Hls({ enableWorker:true, lowLatencyMode:true, renderTextTracksNatively:true, subtitleDisplay:true });
    hls.loadSource(streamUrl);
    hls.attachMedia(v);
    hls.on(Hls.Events.MANIFEST_PARSED, async () => {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('player').style.display = 'block';
      await attachSubtitles(v, subtitleData);
      v.play().catch(() => {});
    });
    hls.on(Hls.Events.ERROR, (_, d) => { if (d.fatal) console.error('HLS Fatal:', d.details); });
  } else {
    v.src = streamUrl;
    v.oncanplay = () => {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('player').style.display = 'block';
    };
    v.addEventListener('loadedmetadata', () => attachSubtitles(v, subtitleData), { once: true });
  }
}
</script>
</body>
</html>
